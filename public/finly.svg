<svg xmlns="http://www.svg.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo oscuro con esquinas redondeadas tipo app de iOS/Android -->
  <rect width="512" height="512" rx="120" fill="#0A0F1E" />
  
  <!-- Sombra sutil detrás del logo para profundidad -->
  <g filter="drop-shadow(0px 8px 16px rgba(0, 230, 118, 0.2))">
    <!-- Una "F" estilizada que también parece un gráfico de barras ascendente -->
    
    <!-- Barra vertical de la F -->
    <rect x="156" y="120" width="64" height="272" rx="32" fill="#00E676" />
    
    <!-- Barra superior de la F -->
    <rect x="240" y="120" width="140" height="64" rx="32" fill="#00E676" />
    
    <!-- Barra media de la F (más corta) -->
    <rect x="240" y="224" width="90" height="64" rx="32" fill="#00E676" />

    <!-- Punto o elemento decorativo extra para darle dinamismo -->
    <circle cx="348" cy="256" r="32" fill="#00E676" />
  </g>
</svg>
