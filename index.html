<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/finly.svg" />
    <link rel="apple-touch-icon" href="/finly.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0F1E" />
    <meta name="description" content="Todo tu dinero en un solo lugar — cuánto puedes gastar hoy, sin fricción." />
    <!-- Manifest PWA: define la pantalla de arranque del sistema al abrir la app
         instalada (fondo azul-noche + ícono + nombre). Sin él, el celular mostraba
         el ícono suelto sobre un fondo blanco por defecto. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Finly" />
    <!-- black-translucent deja que el fondo azul de la app llegue hasta la barra de estado -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Marca "La luz verde": Inter (UI) + IBM Plex Mono (cifras). Antes caían a fuentes del sistema. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <title translate="no">Finly</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
